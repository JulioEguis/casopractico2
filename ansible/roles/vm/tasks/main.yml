---
# primero actualizo los repositorios para tener las últimas versiones
- name: Actualizar repositorios APT
  ansible.builtin.apt:
    update_cache: true

# instalo podman en la vm para poder ejecutar contenedores
- name: Instalar Podman
  ansible.builtin.apt:
    name: podman
    state: present

# me conecto al acr desde la vm para poder descargar la imagen privada
- name: Login en ACR desde la VM
  containers.podman.podman_login:
    username: "{{ acr_username }}"
    password: "{{ acr_password }}"
    registry: "{{ acr_login_server }}"

# arranco el contenedor de nginx mapeando el puerto 80 y con reinicio automático
- name: Desplegar contenedor Nginx
  containers.podman.podman_container:
    name: "{{ web_container_name }}"
    image: "{{ web_container_image }}"
    state: started
    ports:
      - "80:80"
    restart_policy: always